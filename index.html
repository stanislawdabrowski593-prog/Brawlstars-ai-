<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars Shelly - Prototyp</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Arial Black', sans-serif; touch-action: none; }
        canvas { display: block; background: #567d46; }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0044cc; color: yellow; display: flex;
            flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .bar-container { width: 200px; height: 20px; background: #000; border: 3px solid white; margin-top: 20px; }
        #loading-bar { width: 0%; height: 100%; background: yellow; }
    </style>
</head>
<body>

<div id="loading-screen" onclick="startGame()">
    <h1>BRAWL STARS</h1>
    <p>Postać: SHELLY</p>
    <div class="bar-container"><div id="loading-bar"></div></div>
    <p id="status">Dotknij, aby zacząć!</p>
</div>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Dźwięki (Musisz mieć te pliki w folderze lub zamienić linki)
const soundStart = new Audio('start.mp3');
const soundShoot = new Audio('shoot.mp3');

let gameStarted = false;

// Ładowanie (symulacja)
let progress = 0;
const loadInt = setInterval(() => {
    progress += 2;
    document.getElementById('loading-bar').style.width = progress + "%";
    if(progress >= 100) clearInterval(loadInt);
}, 30;

function startGame() {
    if(progress < 100) return;
    document.getElementById('loading-screen').style.display = 'none';
    gameStarted = true;
    soundStart.play().catch(e => console.log("Brak pliku dźwiękowego"));
}

// Ustawienia
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Obiekty gry
const player = {
    x: canvas.width / 2,
    y: canvas.height / 2,
    radius: 25,
    hp: 3600,
    maxHp: 3600,
    speed: 4,
    angle: 0
};

// Ściany (Przeszkody)
const walls = [
    {x: 100, y: 100, w: 80, h: 80},
    {x: canvas.width - 200, y: 150, w: 100, h: 40},
    {x: canvas.width / 2 - 50, y: canvas.height - 150, w: 100, h: 50}
];

let enemies = [{ x: 200, y: 200, hp: 3000, maxHp: 3000 }];
let bullets = [];

// Sterowanie
let touchStart = null;
let moveDir = { x: 0, y: 0 };

window.addEventListener('touchstart', (e) => {
    const touch = e.touches[0];
    if (touch.clientX < canvas.width / 2) {
        touchStart = { x: touch.clientX, y: touch.clientY };
    } else {
        shoot(touch.clientX, touch.clientY);
    }
});

window.addEventListener('touchmove', (e) => {
    if (!touchStart) return;
    const touch = e.touches[0];
    const dx = touch.clientX - touchStart.x;
    const dy = touch.clientY - touchStart.y;
    const angle = Math.atan2(dy, dx);
    moveDir = { x: Math.cos(angle), y: Math.sin(angle) };
    player.angle = angle;
});

window.addEventListener('touchend', () => {
    touchStart = null;
    moveDir = { x: 0, y: 0 };
});

function shoot(tx, ty) {
    if(!gameStarted) return;
    soundShoot.currentTime = 0;
    soundShoot.play().catch(e => {});
    
    const angle = Math.atan2(ty - player.y, tx - player.x);
    // Shelly strzela kilkoma pociskami na raz (spread)
    for(let i = -0.2; i <= 0.2; i += 0.1) {
        bullets.push({
            x: player.x,
            y: player.y,
            vx: Math.cos(angle + i) * 12,
            vy: Math.sin(angle + i) * 12,
            life: 30
        });
    }
}

function checkWallCollision(nx, ny) {
    for(let wall of walls) {
        if(nx + 20 > wall.x && nx - 20 < wall.x + wall.w &&
           ny + 20 > wall.y && ny - 20 < wall.y + wall.h) return true;
    }
    return false;
}

function update() {
    if(!gameStarted) return requestAnimationFrame(update);

    // Ruch z kolizjami ze ścianami
    let nextX = player.x + moveDir.x * player.speed;
    let nextY = player.y + moveDir.y * player.speed;
    
    if(!checkWallCollision(nextX, player.y)) player.x = nextX;
    if(!checkWallCollision(player.x, nextY)) player.y = nextY;

    // Pociski
    bullets.forEach((b, index) => {
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        // Kolizja ze ścianą
        for(let wall of walls) {
            if(b.x > wall.x && b.x < wall.x + wall.w && b.y > wall.y && b.y < wall.y + wall.h) {
                bullets.splice(index, 1);
                return;
            }
        }

        // Kolizja z wrogiem
        enemies.forEach(en => {
            const dist = Math.hypot(b.x - en.x, b.y - en.y);
            if(dist < 30) {
                en.hp -= 300;
                bullets.splice(index, 1);
            }
        });
    });
    
    bullets = bullets.filter(b => b.life > 0);
    draw();
    requestAnimationFrame(update);
}

function drawHealthBar(x, y, hp, maxHp, color) {
    const width = 60;
    ctx.fillStyle = "black";
    ctx.fillRect(x - width/2, y - 45, width, 8);
    ctx.fillStyle = color;
    ctx.fillRect(x - width/2, y - 45, (hp/maxHp) * width, 8);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Ściany
    ctx.fillStyle = "#2d4d1f";
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    // Shelly (Gracz)
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    // Tułów (Fioletowy - Shelly)
    ctx.fillStyle = "#8e44ad";
    ctx.fillRect(-20, -20, 40, 40);
    // Strzelba
    ctx.fillStyle = "#333";
    ctx.fillRect(10, -5, 25, 10);
    ctx.restore();
    drawHealthBar(player.x, player.y, player.hp, player.maxHp, "#2ecc71");

    // Przeciwnicy
    enemies.forEach(en => {
        ctx.fillStyle = "#e74c3c";
        ctx.beginPath(); ctx.arc(en.x, en.y, 25, 0, Math.PI*2); ctx.fill();
        drawHealthBar(en.x, en.y, en.hp, en.maxHp, "red");
    });

    // Pociski
    ctx.fillStyle = "orange";
    bullets.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
    });
}

update();
</script>
</body>
</html>
