<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars Simulator Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: white; user-select: none; }
        
        /* --- LOADER --- */
        #loader {
            position: fixed; width: 100%; height: 100%; z-index: 9999;
            background: url('https://r.jina.ai/i/97034c5625904ec59b5832e81699767c') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 50px;
        }
        .bar-bg { width: 300px; height: 18px; background: rgba(0,0,0,0.8); border: 3px solid #fff; border-radius: 20px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(#ff0, #f90); }

        /* --- LOBBY --- */
        #lobby { display: none; position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #0055ff, #001133); }

        /* GÓRNE UI */
        .top-ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 500; }
        .currency-box { position: absolute; right: 20px; display: flex; gap: 8px; }
        .res-pill { background: rgba(0,0,0,0.7); padding: 5px 12px; border-radius: 15px; border: 2px solid #fff; font-size: 14px; display: flex; align-items: center; gap: 5px; }

        /* LEWE MENU */
        .left-menu { position: absolute; left: 15px; top: 40%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 500; }
        .side-btn { 
            width: 75px; height: 75px; border: 4px solid #000; border-radius: 12px; 
            box-shadow: 0 5px 0 #000; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px;
        }
        .btn-shop { background: #ffcc00; color: #420; }
        .btn-brawlers { background: #d400ff; }
        .btn-pass { background: #00ccff; }

        /* MODALE */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { width: 90%; height: 85%; background: #0033aa; border: 5px solid #fff; border-radius: 20px; padding: 20px; position: relative; overflow-y: auto; }
        .close-btn { position: absolute; top: 10px; right: 10px; background: red; padding: 10px 20px; border-radius: 10px; cursor: pointer; border: 3px solid #fff; font-weight: bold; }

        /* SKLEP - SEKTY */
        .shop-section { margin-bottom: 30px; }
        .shop-grid { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; }
        .offer-card { min-width: 160px; height: 220px; background: #002277; border: 3px solid #ffcc00; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 10px; text-align: center; }
        .buy-btn { background: #00ff44; color: #000; border: none; padding: 10px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .buy-btn:disabled { background: #555; cursor: default; }

        /* LOBBY ELEMENTY */
        .starr-road { position: absolute; left: 15px; bottom: 15px; width: 200px; height: 50px; background: #002d72; border: 2px solid #00ffff; border-radius: 12px; display: flex; align-items: center; padding: 5px; font-size: 11px; }
        .play-container { position: absolute; bottom: 20px; right: 20px; }
        .play-btn { width: 240px; height: 85px; background: linear-gradient(#ff0, #f90); border: none; border-bottom: 8px solid #b36b00; border-radius: 20px; cursor: pointer; }
        .brawler-img { height: 80vh; filter: drop-shadow(0 0 30px #000); position: absolute; top: 10%; left: 50%; transform: translateX(-50%); }
    </style>
</head>
<body>

<div id="loader">
    <div class="bar-bg"><div id="bar-fill"></div></div>
</div>

<div id="lobby">
    <div class="top-ui">
        <div class="res-pill">🏆 <span id="val-trophies">0</span></div>
        <div class="currency-box">
            <div class="res-pill">🪙 <span id="val-coins">0</span></div>
            <div class="res-pill" style="color:#0f4">💎 <span id="val-gems">0</span></div>
            <div class="res-pill" style="color:#c0f">⚡ <span id="val-pp">0</span></div>
        </div>
    </div>

    <div class="left-menu">
        <div class="side-btn btn-shop" onclick="toggleModal('shop-modal', true)">🛒<br>SKLEP</div>
        <div class="side-btn btn-brawlers" onclick="toggleModal('brawlers-modal', true)">👤<br>ZADYMIARZE</div>
        <div class="side-btn btn-pass" onclick="toggleModal('pass-modal', true)">🎫<br>PASS</div>
    </div>

    <img src="https://r.jina.ai/i/05e1974642c842e6a3f96603a10521e1" class="brawler-img">

    <div class="starr-road">
        <div style="width:30px; height:30px; background:#00ffff; border-radius:5px; margin-right:8px;"></div>
        DROGA STARR: <span id="val-starr">0</span>/100
    </div>

    <div class="play-container">
        <button class="play-btn" onclick="alert('SZUKANIE MECZU...')"></button>
    </div>
</div>

<div id="shop-modal" class="modal">
    <div class="modal-content">
        <div class="close-btn" onclick="toggleModal('shop-modal', false)">X</div>
        
        <div class="shop-section">
            <h2>DARMOWE NAGRODY</h2>
            <div class="shop-grid">
                <div class="offer-card" style="border-color:#fff;">
                    <h3>DZIENNY PREZENT</h3>
                    <div style="font-size:40px;">🎁</div>
                    <p>100 Monet<br>20 Punktów Mocy</p>
                    <button class="buy-btn" id="daily-btn" onclick="claimDaily()">ODBIERZ</button>
                </div>
            </div>
        </div>

        <div class="shop-section">
            <h2>OFERTY SPECJALNE (SYMULACJA PLN)</h2>
            <div class="shop-grid">
                <div class="offer-card">
                    <h3>START PACK</h3>
                    <div style="font-size:40px;">💰</div>
                    <p>5000 Monet<br>100 Gemów</p>
                    <button class="buy-btn" onclick="buyOffer(5000, 100, 0)">19,99 PLN</button>
                </div>
                <div class="offer-card" style="border-color:#00ff44;">
                    <h3>GIGA GEMY</h3>
                    <div style="font-size:40px;">💎</div>
                    <p>360 Gemów</p>
                    <button class="buy-btn" onclick="buyOffer(0, 360, 0)">89,99 PLN</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div id="brawlers-modal" class="modal">
    <div class="modal-content">
        <div class="close-btn" onclick="toggleModal('brawlers-modal', false)">X</div>
        <h1>MOI ZADYMIARZE</h1>
        <div style="width:120px; padding:15px; background:#8e44ad; border:3px solid white; border-radius:15px; text-align:center;">
            <img src="https://r.jina.ai/i/05e1974642c842e6a3f96603a10521e1" style="width:100%;">
            <div style="font-size:14px; margin-top:10px;">SHELLY</div>
            <div style="font-size:10px; color:#c0f;">MOC: 1</div>
        </div>
    </div>
</div>

<script>
    let stats = { coins: 0, gems: 0, pp: 0, trophies: 0, starr: 0 };
    let dailyClaimed = false;

    function updateUI() {
        document.getElementById('val-coins').innerText = stats.coins;
        document.getElementById('val-gems').innerText = stats.gems;
        document.getElementById('val-pp').innerText = stats.pp;
        document.getElementById('val-trophies').innerText = stats.trophies;
        document.getElementById('val-starr').innerText = stats.starr;
    }

    function toggleModal(id, show) {
        document.getElementById(id).style.display = show ? 'flex' : 'none';
    }

    function claimDaily() {
        if(!dailyClaimed) {
            stats.coins += 100;
            stats.pp += 20;
            dailyClaimed = true;
            document.getElementById('daily-btn').innerText = "ODEBRANO";
            document.getElementById('daily-btn').disabled = true;
            updateUI();
            alert("Odebrano darmową nagrodę!");
        }
    }

    function buyOffer(c, g, p) {
        stats.coins += c;
        stats.gems += g;
        stats.pp += p;
        updateUI();
        alert("Zakup zakończony pomyślnie! (Symulacja PLN)");
    }

    // Loader
    let p = 0;
    const interval = setInterval(() => {
        p += 5;
        document.getElementById('bar-fill').style.width = p + '%';
        if(p >= 100) {
            clearInterval(interval);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('lobby').style.display = 'block';
        }
    }, 50);
</script>

</body>
</html>
