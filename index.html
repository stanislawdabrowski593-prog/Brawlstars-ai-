<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Starr Island Edition</title>
    <style>
        :root { --bs-blue: #0066ff; --bs-yellow: #ffcc00; --bs-purple: #8e44ad; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: white; user-select: none; touch-action: none; }
        
        /* --- LOADER --- */
        #loader {
            position: fixed; width: 100%; height: 100%; z-index: 9999;
            background: url('https://r.jina.ai/i/97034c5625904ec59b5832e81699767c') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 50px;
        }
        .bar-bg { width: 300px; height: 18px; background: rgba(0,0,0,0.8); border: 3px solid #fff; border-radius: 20px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(#ff0, #f90); }

        /* --- GŁÓWNE EKRANY --- */
        .screen { display: none; position: fixed; width: 100%; height: 100%; background: radial-gradient(circle, #0055ff 0%, #001133 100%); z-index: 100; }
        #lobby { display: block; } /* Startujemy w lobby */

        /* --- UI MODALE (SKLEP, ZADYMIARZE, PASS) --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center;
        }
        .modal-content {
            width: 90%; height: 80%; background: #0033aa; border: 5px solid #fff; border-radius: 20px;
            position: relative; padding: 20px; box-sizing: border-box;
        }
        .close-btn { position: absolute; top: -20px; right: -20px; width: 50px; height: 50px; background: red; border: 4px solid #fff; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* --- GÓRNE ZASOBY (0-0-0-0) --- */
        .top-ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 500; }
        .currency-box { position: absolute; right: 20px; display: flex; gap: 8px; }
        .res-pill { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 15px; border: 2px solid #fff; font-size: 14px; }

        /* --- LEWE MENU PIONOWE --- */
        .left-menu { position: absolute; left: 15px; top: 40%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 500; }
        .side-btn { 
            width: 80px; height: 80px; border: 4px solid #000; border-radius: 15px; 
            box-shadow: 0 6px 0 #000; cursor: pointer; transition: 0.1s;
            display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px;
        }
        .side-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #000; }
        .btn-shop { background: linear-gradient(#ffcc00, #ff8800); color: #420; }
        .btn-brawlers { background: linear-gradient(#d400ff, #770099); }
        .btn-pass { background: linear-gradient(#00ccff, #0044ff); }

        /* --- DROGA STARR (DÓŁ LEWO) --- */
        .starr-road {
            position: absolute; left: 15px; bottom: 15px; width: 220px; height: 60px;
            background: linear-gradient(90deg, #002d72, #0055ff); border: 3px solid #00ffff;
            border-radius: 15px; z-index: 500; display: flex; align-items: center; padding: 5px; cursor: pointer;
        }

        /* --- POSTAĆ SHELLY --- */
        .brawler-container { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .shelly-img { height: 85%; filter: drop-shadow(0 20px 40px #000); }

        /* --- PRZYCISK GRAJ (BEZ NAPISU) --- */
        .play-container { position: absolute; bottom: 20px; right: 20px; z-index: 500; }
        .play-btn {
            width: 260px; height: 90px; background: linear-gradient(#ff0, #f90);
            border: none; border-bottom: 10px solid #b36b00; border-radius: 25px;
            cursor: pointer; transition: 0.1s;
        }
        .play-btn:active { transform: scale(0.95); border-bottom-width: 2px; }

        /* WYBÓR TRYBU */
        .mode-btn {
            position: absolute; bottom: 120px; right: 40px; width: 220px; height: 50px;
            background: rgba(0,0,0,0.8); border: 2px solid #fff; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="bar-bg"><div id="bar-fill"></div></div>
</div>

<div id="lobby" class="screen">
    <div class="top-ui">
        <div class="res-pill" style="color:#ffaa00">🏆 0</div>
        <div class="currency-box">
            <div class="res-pill">🪙 0</div>
            <div class="res-pill" style="color:#0f4">💎 0</div>
            <div class="res-pill" style="color:#c0f">⚡ 0</div>
        </div>
    </div>

    <div class="left-menu">
        <div class="side-btn btn-shop" onclick="openModal('shop-modal')"><b>🛒</b>SKLEP</div>
        <div class="side-btn btn-brawlers" onclick="openModal('brawlers-modal')"><b>👤</b>ZADYMIARZE</div>
        <div class="side-btn btn-pass" onclick="openModal('pass-modal')"><b>🎫</b>PASS</div>
    </div>

    <div class="starr-road" onclick="alert('Droga Starr: Następna Nita!')">
        <div style="width:40px; height:40px; background:#00ffff; border-radius:8px; margin-right:10px;"></div>
        <div style="font-size:11px;">DROGA STARR<br><span style="color:#00ffff">0 / 100</span></div>
    </div>

    <div class="brawler-container">
        <img src="https://r.jina.ai/i/05e1974642c842e6a3f96603a10521e1" class="shelly-img">
    </div>

    <div class="mode-btn" onclick="nextMode()"><span id="mode-text">STARCIE SOLO</span></div>
    
    <div class="play-container">
        <button class="play-btn" onclick="startMM()"></button> </div>
</div>

<div id="shop-modal" class="modal">
    <div class="modal-content">
        <div class="close-btn" onclick="closeModal('shop-modal')">X</div>
        <h1>SKLEP</h1>
        <div style="display:flex; gap:20px;">
            <div style="width:150px; height:200px; background:#555; border-radius:10px; display:flex; align-items:center; justify-content:center;">DARMOWA<br>SKRZYNKA</div>
            <div style="width:150px; height:200px; background:#555; border-radius:10px; display:flex; align-items:center; justify-content:center;">OFERTA<br>GEMÓW</div>
        </div>
    </div>
</div>

<div id="brawlers-modal" class="modal">
    <div class="modal-content">
        <div class="close-btn" onclick="closeModal('brawlers-modal')">X</div>
        <h1>ZADYMIARZE (1/80)</h1>
        <div style="width:100px; height:130px; background:purple; border:3px solid #fff; border-radius:10px; text-align:center; padding-top:10px;">
            <img src="https://r.jina.ai/i/05e1974642c842e6a3f96603a10521e1" style="width:60px;"><br>SHELLY
        </div>
    </div>
</div>

<div id="pass-modal" class="modal">
    <div class="modal-content" style="background: linear-gradient(#00ccff, #0044ff);">
        <div class="close-btn" onclick="closeModal('pass-modal')">X</div>
        <h1>BRAWL PASS: SEZON 1</h1>
        <div style="width:100%; height:100px; background:rgba(255,255,255,0.2); margin-top:50px; display:flex; align-items:center; padding:0 20px;">
            NAGRODA 1: 🪙 50 (Zablokowane)
        </div>
    </div>
</div>

<script>
    // System Modali
    function openModal(id) { document.getElementById(id).style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    // Tryby
    let modes = ["STARCIE SOLO", "STARCIE DUO", "STARCIE TRIO"];
    let mIdx = 0;
    function nextMode() {
        mIdx = (mIdx + 1) % modes.length;
        document.getElementById('mode-text').innerText = modes[mIdx];
    }

    // Graj
    function startMM() {
        alert("WYSZUKIWANIE GRACZY...");
    }

    // Loader
    let p = 0;
    const load = setInterval(() => {
        p += 5;
        document.getElementById('bar-fill').style.width = p + '%';
        if(p >= 100) {
            clearInterval(load);
            document.getElementById('loader').style.display = 'none';
        }
    }, 50);
</script>

</body>
</html>
