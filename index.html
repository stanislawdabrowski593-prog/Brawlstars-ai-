<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars Pro</title>
    <style>
        :root {
            --bs-blue: #0051ff;
            --bs-yellow: #ffcc00;
            --bs-purple: #8e44ad;
        }
        body { margin: 0; overflow: hidden; background: #001a4d; font-family: 'Arial Black', sans-serif; color: white; touch-action: none; }
        
        /* --- EKRAN ŁADOWANIA --- */
        #loading-screen {
            position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle, #0055ff, #001133);
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;
        }
        .logo { font-size: 50px; font-style: italic; text-shadow: 0 5px 0 #000, 0 8px 15px rgba(0,0,0,0.5); color: var(--bs-yellow); margin-bottom: 40px; }
        .bar-bg { width: 280px; height: 18px; background: #000c24; border: 3px solid #fff; border-radius: 20px; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #loading-bar { width: 0%; height: 100%; background: linear-gradient(to bottom, #ffff00, #ffaa00); transition: width 0.2s; }

        /* --- MENU GŁÓWNE --- */
        #main-menu {
            display: none; position: fixed; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png'), radial-gradient(circle at center, #0066ff 0%, #002266 100%);
        }

        /* Lewy Panel - Sklep, Zadymiarze */
        .left-menu {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 10;
        }
        .side-btn {
            width: 80px; height: 80px; background: #fff; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; border: 4px solid #000; box-shadow: 0 5px 0 #000;
            color: #000; text-transform: uppercase;
        }
        .btn-shop { background: linear-gradient(#ffeb3b, #fbc02d); }
        .btn-brawlers { background: linear-gradient(#e040fb, #7b1fa2); color: white; }

        /* Góra: Waluty */
        .top-bar { position: absolute; top: 10px; right: 15px; display: flex; gap: 10px; }
        .res { 
            background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 20px; 
            border: 2px solid rgba(255,255,255,0.3); font-size: 14px; display: flex; align-items: center;
        }

        /* Postać Shelly */
        .character-display {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            pointer-events: none;
        }
        .shelly-render {
            width: 160px; height: 220px; background: var(--bs-purple);
            border: 8px solid #fff; border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative; animation: float 3s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .brawler-label {
            margin-top: 20px; font-size: 32px; background: rgba(0,0,0,0.5);
            padding: 5px 40px; border-radius: 50px; border: 2px solid #fff;
        }

        /* Dół: Starr Road i GRAJ */
        .bottom-section {
            position: absolute; bottom: 20px; width: 100%;
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .starr-road {
            width: 300px; height: 50px; background: linear-gradient(90deg, #002d72, #0051ff);
            border-radius: 25px; border: 3px solid #00ffff; display: flex; align-items: center; padding: 0 15px;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }
        .kredyt-icon { width: 30px; height: 30px; background: #00ffff; border-radius: 8px; margin-right: 15px; }

        #play-btn {
            width: 240px; height: 75px; background: linear-gradient(#fffb00, #ff9900);
            border: none; border-bottom: 8px solid #b36b00; border-radius: 20px;
            color: #442200; font-size: 36px; font-weight: bold; font-style: italic;
            text-shadow: 0 2px 0 rgba(255,255,255,0.5); cursor: pointer;
        }
        #play-btn:active { transform: scale(0.95); border-bottom: 2px solid #b36b00; }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="logo">BRAWL STARS</div>
    <div class="bar-bg"><div id="loading-bar"></div></div>
</div>

<div id="main-menu">
    <div class="top-bar">
        <div class="res" style="color: #ffcc00;">🪙 1250</div>
        <div class="res" style="color: #ff00ff;">💎 30</div>
    </div>

    <div class="left-menu">
        <div class="side-btn btn-shop">🛒<br>Sklep</div>
        <div class="side-btn btn-brawlers">👤<br>Zadymiarze</div>
        <div class="side-btn" style="background: #eee;">💬<br>Klub</div>
    </div>

    <div class="character-display">
        <div class="shelly-render">
            <div style="position: absolute; top: 20px; left: 20px; width: 30px; height: 30px; background: #fff; border-radius: 50%;"></div>
            <div style="position: absolute; top: 20px; right: 20px; width: 30px; height: 30px; background: #fff; border-radius: 50%;"></div>
        </div>
        <div class="brawler-label">SHELLY</div>
    </div>

    <div class="bottom-section">
        <div class="starr-road">
            <div class="kredyt-icon"></div>
            <div style="font-size: 12px; flex-grow: 1;">
                STARR ROAD: <span style="color: #00ffff;">450/925</span>
            </div>
            <span>➔</span>
        </div>
        <button id="play-btn" onclick="alert('START!')">GRAJ</button>
    </div>
</div>

<script>
    const loadingBar = document.getElementById('loading-bar');
    const loadingScreen = document.getElementById('loading-screen');
    const mainMenu = document.getElementById('main-menu');

    // Automatyczne ładowanie
    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 5;
        if (progress >= 100) {
            progress = 100;
            clearInterval(interval);
            setTimeout(() => {
                loadingScreen.style.opacity = '0';
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                    mainMenu.style.display = 'block';
                }, 500);
            }, 500);
        }
        loadingBar.style.width = progress + '%';
    }, 80);
</script>

</body>
</html>
