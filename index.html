<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Starr Island Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: white; user-select: none; }
        
        /* --- BACKGROUND --- */
        #main-menu {
            display: none; position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0055ff 0%, #001133 100%);
        }

        /* --- KARNET OKNO (MODAL) --- */
        #pass-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; flex-direction: column; align-items: center; justify-content: center;
        }
        .pass-content {
            width: 80%; background: linear-gradient(#00ccff, #0044ff); border: 5px solid #fff;
            border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 0 30px #00ccff;
        }
        .reward-grid { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .reward-item { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 10px; border: 2px solid #fff; width: 80px; }

        /* --- GÓRNE UI (PUCHARKI I WALUTY) --- */
        .top-ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .trophy-bar { 
            background: rgba(0,0,0,0.6); padding: 5px 20px; border-radius: 20px; border: 2px solid #fff;
            display: flex; align-items: center; gap: 10px; font-size: 18px; color: #ffaa00;
        }
        .res-container { position: absolute; right: 15px; display: flex; gap: 10px; }
        .res-item { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; border: 1px solid #fff; font-size: 13px; }

        /* --- LEWE MENU --- */
        .side-menu {
            position: absolute; left: 15px; top: 40%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 100;
        }
        .btn-ui {
            width: 75px; height: 75px; border: 4px solid #000; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; box-shadow: 0 5px 0 #000; cursor: pointer; transition: 0.1s;
        }
        .btn-ui:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .s-shop { background: linear-gradient(#ffdd00, #ff8800); color: #420; }
        .s-brawlers { background: linear-gradient(#d400ff, #770099); color: white; }

        /* --- KARNET (LEWY DÓŁ) --- */
        .pass-btn {
            position: absolute; left: 15px; bottom: 20px; width: 90px; height: 90px;
            background: linear-gradient(#00ccff, #0044ff); border: 4px solid #fff; border-radius: 15px;
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 15px #00ccff; font-size: 11px; font-weight: bold; cursor: pointer;
        }

        /* --- POSTAĆ SHELLY --- */
        .hero-box { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hero-img { height: 85%; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.8)); transition: 0.3s; }
        .hero-name { margin-top: -50px; background: rgba(0,0,0,0.8); padding: 10px 60px; border: 3px solid #fff; border-radius: 50px; font-size: 30px; text-shadow: 2px 2px #000; }

        /* --- PRZYCISK GRAJ --- */
        .play-container { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; }
        .btn-play {
            width: 250px; height: 85px; background: linear-gradient(#ffff00, #ff8800);
            border: none; border-bottom: 8px solid #b36b00; border-radius: 20px;
            color: #420; font-size: 38px; font-weight: bold; font-style: italic; cursor: pointer;
        }

        /* --- LOADER --- */
        #loader {
            position: fixed; width: 100%; height: 100%; z-index: 3000;
            background: url('loading_bg.png') no-repeat center center; background-size: cover;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 60px;
        }
        .l-bar { width: 280px; height: 18px; background: #000; border: 3px solid #fff; border-radius: 20px; overflow: hidden; }
        #l-progress { width: 0%; height: 100%; background: #ff0; }
    </style>
</head>
<body>

<div id="loader">
    <div class="l-bar"><div id="l-progress"></div></div>
    <div style="margin-top: 10px; font-style: italic;">ŁADOWANIE...</div>
</div>

<div id="pass-overlay" onclick="this.style.display='none'">
    <div class="pass-content" onclick="event.stopPropagation()">
        <h2>BRAWL PASS</h2>
        <div class="reward-grid">
            <div class="reward-item">🪙<br>500</div>
            <div class="reward-item">💎<br>10</div>
            <div class="reward-item">✨<br>100</div>
        </div>
        <button onclick="document.getElementById('pass-overlay').style.display='none'" style="margin-top:20px; padding:10px 20px; border-radius:10px; border:none; background:#ffff00; font-weight:bold;">ZAMKNIJ</button>
    </div>
</div>

<div id="main-menu">
    <div class="top-ui">
        <div class="trophy-bar">🏆 8,450</div>
        <div class="res-container">
            <div class="res-item">🪙 2,400</div>
            <div class="res-item" style="color:#0f0">💎 45</div>
        </div>
    </div>

    <div class="side-menu">
        <div class="btn-ui s-shop">SKLEP</div>
        <div class="btn-ui s-brawlers" onclick="nextHero()">ZADYMIARZE</div>
    </div>

    <div class="pass-btn" onclick="document.getElementById('pass-overlay').style.display='flex'">
        <div style="font-size: 30px;">🎫</div>KARNET
    </div>

    <div class="hero-box">
        <img src="shelly_win.png" id="hero-img" class="hero-img" onerror="this.src='https://via.placeholder.com/400x700/8e44ad/fff?text=SHELLY+WIN'">
        <div class="hero-name" id="hero-name">SHELLY</div>
    </div>

    <div class="play-container">
        <button class="btn-play" onclick="alert('START MECZU!')">GRAJ</button>
    </div>
</div>

<script>
    const heroes = [
        {name: "SHELLY", img: "shelly_win.png"},
        {name: "COLT", img: "colt.png"},
        {name: "EL PRIMO", img: "elprimo.png"}
    ];
    let hIdx = 0;

    function nextHero() {
        hIdx = (hIdx + 1) % heroes.length;
        const img = document.getElementById('hero-img');
        const name = document.getElementById('hero-name');
        img.style.transform = 'scale(0.8) opacity(0)';
        setTimeout(() => {
            name.innerText = heroes[hIdx].name;
            img.src = heroes[hIdx].img;
            img.style.transform = 'scale(1) opacity(1)';
        }, 150);
    }

    let p = 0;
    const bar = document.getElementById('l-progress');
    const timer = setInterval(() => {
        p += Math.random() * 6;
        if(p > 100) p = 100;
        bar.style.width = p + '%';
        if(p === 100) {
            clearInterval(timer);
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-menu').style.display = 'block';
            }, 500);
        }
    }, 80);
</script>

</body>
</html>
