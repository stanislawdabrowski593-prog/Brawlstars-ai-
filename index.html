<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Stars - Start 0</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; color: white; user-select: none; touch-action: none; }
        
        /* EKRAN ŁADOWANIA - TWOJE TŁO STARR ISLAND */
        #loader {
            position: fixed; width: 100%; height: 100%; z-index: 5000;
            background: url('https://r.jina.ai/i/97034c5625904ec59b5832e81699767c') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; padding-bottom: 50px;
        }
        .bar-bg { width: 300px; height: 18px; background: rgba(0,0,0,0.8); border: 3px solid #fff; border-radius: 20px; overflow: hidden; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(#ff0, #f90); }

        /* MENU GŁÓWNE */
        #menu {
            display: none; position: fixed; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0055ff 0%, #001133 100%);
        }

        /* GÓRNE UI - ZASOBY (WSZYSTKO NA 0) */
        .top-row { position: absolute; top: 10px; width: 100%; display: flex; justify-content: center; z-index: 100; }
        .trophy-badge { background: rgba(0,0,0,0.6); padding: 5px 20px; border: 2px solid #fff; border-radius: 20px; color: #ffaa00; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        
        .currency-container { position: absolute; right: 15px; display: flex; gap: 8px; }
        .res-pill { 
            background: rgba(0,0,0,0.7); padding: 4px 12px; border-radius: 15px; 
            border: 2px solid rgba(255,255,255,0.3); font-size: 13px; display: flex; align-items: center; gap: 5px;
        }
        .icon-coin { color: #ffcc00; }
        .icon-gem { color: #00ff44; } /* ZIELONE GEMY */
        .icon-pp { color: #cc00ff; }  /* PUNKTY MOCY */

        /* LEWE MENU PIONOWE */
        .left-sidebar {
            position: absolute; left: 15px; top: 45%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 15px; z-index: 200;
        }
        .side-btn {
            width: 75px; height: 75px; border: 4px solid #000; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; box-shadow: 0 5px 0 #000; cursor: pointer; transition: 0.1s;
        }
        .side-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #000; }
        .s-shop { background: linear-gradient(#ffdd00, #ff8800); color: #420; }
        .s-brawlers { background: linear-gradient(#d400ff, #770099); color: white; }
        .s-pass { background: linear-gradient(#00ccff, #0044ff); color: white; }

        /* SHELLY - TWÓJ RENDER */
        .brawler-display {
            position: absolute; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .brawler-img {
            height: 85%; filter: drop-shadow(0 15px 35px rgba(0,0,0,0.9));
            animation: idle 4s infinite ease-in-out;
        }
        @keyframes idle { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .name-plate { margin-top: -55px; background: rgba(0,0,0,0.8); padding: 8px 70px; border: 3px solid #fff; border-radius: 40px; font-size: 30px; z-index: 10; }

        /* PRZYCISK GRAJ */
        .footer { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; }
        .play-btn {
            width: 250px; height: 85px; background: linear-gradient(#ff0, #f90);
            border: none; border-bottom: 8px solid #b36b00; border-radius: 20px;
            color: #420; font-size: 38px; font-weight: bold; font-style: italic; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="loader">
    <div class="bar-bg"><div id="bar-fill"></div></div>
    <div style="margin-top:10px; font-size: 12px; letter-spacing: 2px;">WCZYTYWANIE...</div>
</div>

<div id="menu">
    <div class="top-row">
        <div class="trophy-badge"><span>🏆</span> 0</div>
        <div class="currency-container">
            <div class="res-pill"><span class="icon-coin">🪙</span> 0</div>
            <div class="res-pill"><span class="icon-gem">💎</span> 0</div>
            <div class="res-pill"><span class="icon-pp">⚡</span> 0</div>
        </div>
    </div>

    <div class="left-sidebar">
        <div class="side-btn s-shop"><b>🛒</b><br>SKLEP</div>
        <div class="side-btn s-brawlers" onclick="alert('Zadymiarze: 1/80')"><b>👤</b><br>ZADYMIARZE</div>
        <div class="side-btn s-pass"><b>🎫</b><br>PASS</div>
    </div>

    <div class="brawler-display">
        <img src="https://r.jina.ai/i/05e1974642c842e6a3f96603a10521e1" class="brawler-img" alt="Shelly">
        <div class="name-plate">SHELLY</div>
    </div>

    <div class="footer">
        <button class="play-btn" onclick="alert('SZUKANIE MECZU...')">GRAJ</button>
    </div>
</div>

<script>
    let progress = 0;
    const bar = document.getElementById('bar-fill');
    const loading = setInterval(() => {
        progress += Math.random() * 6;
        if(progress >= 100) {
            progress = 100;
            clearInterval(loading);
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('menu').style.display = 'block';
            }, 500);
        }
        bar.style.width = progress + '%';
    }, 70);
</script>

</body>
</html>
